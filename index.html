<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F4F2ED">
<title>Таймеры</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Таймеры">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root{
    /* Light theme (default) */
    --bg: #F4F2ED;
    --surface: #FFFFFF;
    --surface-2: #ECE9E2;
    --line: #DCD8CE;
    --text: #1C1D1B;
    --text-dim: #767369;

    --idle-track: #E7E4DC;

    --okrun: #5C6F63;
    --okrun-dim: #DCE4DD;

    --amber: #B8791C;
    --amber-dim: #F2DDB4;

    --red: #C73B3B;
    --red-dim: #F4C7C5;
    --red-solid: #D6463F;

    --mono: 'Google Sans', sans-serif;
    --sans: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html[data-theme="dark"]{
    --bg: #15181A;
    --surface: #1F2326;
    --surface-2: #262B2E;
    --line: #34393D;
    --text: #ECEAE4;
    --text-dim: #8A9096;

    --idle-track: #2E3438;

    --okrun: #7C9484;
    --okrun-dim: #313B34;

    --amber: #E8A33D;
    --amber-dim: #4A3A1E;

    --red: #E5484D;
    --red-dim: #4A2424;
    --red-solid: #D6463F;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  body{
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .page{
    max-width: 560px;
    margin: 0 auto;
    padding: 14px 12px 16px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .header{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 0 2px 12px;
    flex-shrink: 0;
  }

  .header-text .eyebrow{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 3px;
  }

  .header-text h1{
    font-size: 15px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  /* ---------- Theme toggle ---------- */

  .theme-toggle{
    flex-shrink: 0;
    width: 44px;
    height: 26px;
    border-radius: 13px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    position: relative;
    padding: 0;
    cursor: pointer;
  }

  .theme-toggle .dot{
    position: absolute;
    top: 2px; left: 2px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s cubic-bezier(0.2,0.8,0.2,1);
  }

  html[data-theme="dark"] .theme-toggle .dot{
    transform: translateX(18px);
  }

  .theme-toggle .dot svg{
    width: 12px; height: 12px;
    fill: var(--bg);
  }

  .card-list{
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 1fr;
    gap: 7px;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  /* ---------- Card ---------- */

  .card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 8px 9px;
    transition: border-color 0.3s ease, background-color 0.3s ease;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .card.is-overtime{
    border-color: var(--red);
  }

  .card.is-active{
    grid-column: 1 / -1;
  }

  .card-top{
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 3px 6px;
    gap: 2px 4px;
  }

  .card-name{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text);
    transition: color 0.3s ease;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1 1 auto;
  }

  .card-duration{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .card-name.state-warn{ color: var(--amber); }
  .card-name.state-danger{ color: var(--red); }

  /* ---------- Swipe track ---------- */

  .track{
    position: relative;
    flex: 1 1 auto;
    min-height: 38px;
    border-radius: 22px;
    background: var(--idle-track);
    overflow: hidden;
    touch-action: none;
    user-select: none;
    transition: background-color 0.3s ease;
  }

  .track.is-running{
    background: var(--okrun-dim);
  }

  .track.state-warn{ background: var(--amber-dim); }
  .track.state-danger{ background: var(--red-dim); }

  .track.is-overtime{
    background: var(--red-solid);
  }

  .track-label{
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 2;
  }

  .track-time{
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s ease;
    line-height: 1;
  }

  .track.is-running .track-time{ color: var(--okrun); }
  .track.state-warn .track-time{ color: var(--amber); }
  .track.state-danger .track-time{ color: var(--red); }
  .track.is-overtime .track-time{ color: #FFFFFF; }

  .track-sublabel{
    position: absolute;
    left: 0; right: 0;
    bottom: 4px;
    text-align: center;
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    line-height: 1;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .track.is-overtime .track-sublabel{
    opacity: 1;
  }

  /* knob */

  .knob{
    position: absolute;
    top: 3px; left: 3px;
    width: 32px; height: 32px;
    border-radius: 22px;
    background: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: background-color 0.2s ease;
    will-change: transform;
  }

  .knob svg{
    width: 14px; height: 14px;
    display: block;
  }

  .knob .icon-play{ fill: var(--bg); }
  .knob .icon-stop{ fill: var(--bg); display:none; }

  .track.is-running .knob .icon-play{ display:none; }
  .track.is-running .knob .icon-stop{ display:block; }

  .track.dragging .knob{ transition: none; }
  .track:not(.dragging) .knob{ transition: transform 0.28s cubic-bezier(0.2,0.8,0.2,1); }

  /* ---------- Reset-all ---------- */

  .footer-row{
    margin-top: 8px;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
  }

  .reset-all{
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 6px 14px;
  }

  .reset-all:active{ background: var(--surface-2); }

</style>
</head>
<body>

  <div class="page">
    <div class="header">
      <div class="header-text">
        <p class="eyebrow">Пульт таймеров</p>
        <h1>Свайпните, чтобы запустить</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
        <span class="dot">
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><g stroke-width="1.6"><line x1="12" y1="2" x2="12" y2="4.5" stroke="currentColor"/><line x1="12" y1="19.5" x2="12" y2="22" stroke="currentColor"/><line x1="2" y1="12" x2="4.5" y2="12" stroke="currentColor"/><line x1="19.5" y1="12" x2="22" y2="12" stroke="currentColor"/></g></svg>
        </span>
      </button>
    </div>

    <div class="card-list" id="cardList"></div>

    <div class="footer-row">
      <button class="reset-all" id="resetAllBtn" type="button">Сбросить все</button>
    </div>
  </div>

<script src="timers.js"></script>
</body>
</html>
